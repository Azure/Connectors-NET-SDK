name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      powershell: ${{ steps.filter.outputs.powershell }}
      markdown: ${{ steps.filter.outputs.markdown }}
      yaml: ${{ steps.filter.outputs.yaml }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            powershell:
              - '**/*.ps1'
              - 'PSScriptAnalyzerSettings.psd1'
            markdown:
              - '**/*.md'
              - '.markdownlint.*'
              - '.markdownlint.jsonc'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - '.yamllint.yml'

  powershell:
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.powershell == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            throw "PSScriptAnalyzer found $(@($results).Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer: all checks passed."

  markdown:
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.markdown == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx markdownlint-cli2@0.17.2 '**/*.md'

  yaml:
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.yaml == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install yamllint==1.38.0
      - run: yamllint -c .yamllint.yml .

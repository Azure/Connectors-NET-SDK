name: Validate Release Tag

# Enforces PR-first-then-tag release process: every v* tag must point to a
# commit that is reachable from main (i.e., the tagged changes went through
# a reviewed PR before tagging). Tags on unreviewed branches will fail this
# check and create an issue alerting maintainers.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history needed for merge-base check

      - name: Verify tag commit is on main
        run: |
          TAG_COMMIT="${GITHUB_SHA}"
          echo "Tag: ${GITHUB_REF_NAME}"
          echo "Tag commit: ${TAG_COMMIT}"

          # Check if the tagged commit is an ancestor of main
          if git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "✅ Tag commit is reachable from main — release integrity verified."
          else
            echo "❌ Tag commit ${TAG_COMMIT} is NOT on main."
            echo "   This tag was created on a branch with changes that did not go through PR review."
            echo "   Release process requires: PR to main → merge → tag the merged main commit."
            echo ""
            echo "   To fix: delete this tag, merge the changes to main via PR, then re-tag."
            echo "   git push origin :refs/tags/${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Release tag ${context.ref.replace('refs/tags/', '')} is not on main`,
              body: [
                `The tag \`${context.ref.replace('refs/tags/', '')}\` (commit \`${context.sha.substring(0, 8)}\`) was pushed but the commit is **not reachable from \`main\`**.`,
                '',
                'This violates the PR-first-then-tag release process. Tagged changes must go through a reviewed PR to `main` before tagging.',
                '',
                '**Action required:**',
                '1. Delete the tag: `git push origin :refs/tags/' + context.ref.replace('refs/tags/', '') + '`',
                '2. Merge the release changes to `main` via PR',
                '3. Re-tag from the merged `main` commit',
                '',
                `Triggered by: @${context.actor}`,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['release-integrity'],
            });
